<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔒 Protected Page</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0d0d;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'JetBrains Mono',monospace;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.012) 2px,rgba(255,255,255,.012) 4px);pointer-events:none;z-index:50;}
  .box{width:min(420px,92vw);background:#141414;border:1px solid #222;border-radius:14px;padding:40px 32px;box-shadow:0 0 60px rgba(0,0,0,.8);animation:drop .4s ease-out}
  @keyframes drop{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
  .icon{text-align:center;font-size:44px;margin-bottom:16px}
  h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#e8e8e8;text-align:center;margin-bottom:6px;letter-spacing:-0.5px}
  .sub{text-align:center;font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
  .pw-wrap{position:relative;margin-bottom:14px}
  input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#e8e8e8;font-family:'JetBrains Mono',monospace;font-size:15px;padding:14px 46px 14px 16px;border-radius:8px;outline:none;transition:border-color .2s,box-shadow .2s;letter-spacing:3px}
  input:focus{border-color:#e8ff47;box-shadow:0 0 0 3px rgba(232,255,71,.08)}
  .eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#555;cursor:pointer;font-size:16px;transition:color .15s}
  .eye:hover{color:#e8e8e8}
  .btn{width:100%;background:#e8ff47;color:#000;border:none;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:15px;border-radius:8px;cursor:pointer;transition:box-shadow .2s,transform .1s;margin-top:4px}
  .btn:hover{box-shadow:0 0 28px rgba(232,255,71,.25);transform:translateY(-1px)}
  .btn:active{transform:scale(.98)}
  .err{display:none;margin-top:12px;text-align:center;font-size:11px;color:#ff4757;letter-spacing:1px}
  .err.show{display:block}
  .prog{display:none;margin-top:16px}
  .prog-bar{height:3px;background:#222;border-radius:2px;overflow:hidden}
  .prog-fill{height:100%;background:#47d4ff;border-radius:2px;width:0%;transition:width .3s;box-shadow:0 0 8px rgba(71,212,255,.5)}
  .prog-label{font-size:10px;color:#47d4ff;letter-spacing:1px;margin-top:8px;text-align:center}
  .hint{margin-top:20px;text-align:center;font-size:10px;color:#333;letter-spacing:1px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Protected Page</h1>
  <div class="sub">Enter password to unlock</div>
  <div class="pw-wrap">
    <input type="password" id="pw" placeholder="Password..." autofocus onkeydown="if(event.key==='Enter')unlock()" />
    <button class="eye" onclick="var i=document.getElementById('pw');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈'">👁</button>
  </div>
  <button class="btn" onclick="unlock()">Unlock →</button>
  <div class="err" id="err">Incorrect password — try again</div>
  <div class="prog" id="prog">
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div class="prog-label" id="pl">Verifying...</div>
  </div>
  <div class="hint">AES-256-GCM encrypted</div>
</div>

function b64(s){const b=atob(s);return new Uint8Array([...b].map(c=>c.charCodeAt(0)))}
function sp(p,l){document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=l}
async function unlock(){
  const pw=document.getElementById('pw').value;
  if(!pw)return;
  document.getElementById('err').classList.remove('show');
  document.getElementById('prog').style.display='block';
  sp(15,'Importing key...');
  await new Promise(r=>setTimeout(r,20));
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    sp(35,'Deriving key (PBKDF2 × 200,000)...');await new Promise(r=>setTimeout(r,20));
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    sp(70,'Decrypting...');await new Promise(r=>setTimeout(r,20));
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},k,b64(DATA));
    sp(100,'Done!');
    const html=new TextDecoder().decode(plain);
    await new Promise(r=>setTimeout(r,200));
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('prog').style.display='none';
    document.getElementById('err').classList.add('show');
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
</script>
