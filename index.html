  .option.wrong { background: #ffcdd2; border-color: #f44336; color: #c62828; }

  .next-btn {

    color: white;

</style>
</head>

      {q:"What is the correct pathway for a conscious (voluntary) response?",options:["Receptor → spinal cord → effector","Receptor → sensory → brain → motor → effector","Receptor → hormone → effector","Stimulus → automatic response"],correct:1,explanation:"Conscious responses involve the brain processing the information before sending a motor response."}

      {q:"What controls the amount of light entering the eye?",options:["Cornea","Iris","Lens","Retina"],correct:1,explanation:"The iris controls the size of the pupil, regulating how much light enters."},
      {q:"What is the pupil?",options:["The coloured part of the eye","The hole in the centre of the iris that lets light in","The clear front surface","The back of the eye"],correct:1,explanation:"The pupil is the black hole in the centre of the iris through which light enters."},
      {q:"What detects light in the eye?",options:["Cornea","Lens","Retina (rod and cone cells)","Sclera"],correct:2,explanation:"The retina contains rod cells (dim light) and cone cells (colour) that detect light."},
      {q:"What carries visual impulses from the eye to the brain?",options:["Optic nerve","Optic muscle","Retina","Cornea"],correct:0,explanation:"The optic nerve carries electrical impulses from the retina to the brain for processing."},
      {q:"What is the sclera?",options:["The clear front of the eye","The tough, white outer layer that protects the eye","The coloured part","The light-sensitive layer"],correct:1,explanation:"The sclera is the tough, white outer coat that protects and maintains the shape of the eye."},
      {q:"What is the cornea?",options:["The coloured part","The transparent front surface that refracts light","The back of the eye","The muscle controlling the lens"],correct:1,explanation:"The cornea is the transparent front surface that begins the process of focusing light."},
      {q:"What controls the shape of the lens?",options:["Iris","Ciliary muscle","Retina","Optic nerve"],correct:1,explanation:"The ciliary muscle contracts or relaxes to change the shape of the lens for focusing."},
      {q:"What do suspensory ligaments do?",options:["Control pupil size","Attach the ciliary body to the lens","Detect light","Carry impulses"],correct:1,explanation:"Suspensory ligaments connect the ciliary body to the lens, holding it in place."},
      {q:"When looking at a NEAR object, what happens to the ciliary muscle?",options:["It relaxes","It contracts","It stays the same","It disappears"],correct:1,explanation:"For near vision: ciliary muscle CONTRACTS, suspensory ligaments slacken, lens becomes fat/rounded."},
      {q:"When looking at a NEAR object, what shape does the lens become?",options:["Thin and flat","Fat and rounded","Square","Oval and stretched"],correct:1,explanation:"For near objects, the lens becomes fatter/more rounded to refract light more strongly."},
      {q:"When looking at a NEAR object, what happens to the suspensory ligaments?",options:["They pull tight","They slacken","They break","They disappear"],correct:1,explanation:"When ciliary muscle contracts, suspensory ligaments slacken, allowing the lens to become fat."},
      {q:"What is short-sightedness (myopia)?",options:["Can see far but not near","Can see near but not far — image focuses in front of retina","Cannot see colour","Cannot see in dim light"],correct:1,explanation:"In short-sightedness, the lens is too curved or eyeball too long — image focuses in FRONT of the retina."},
      {q:"How is short-sightedness corrected?",options:["Convex (converging) lens","Concave (diverging) lens","Flat glass","Sunglasses"],correct:1,explanation:"A concave (diverging) lens spreads light out before it enters the eye, moving the focus back onto the retina."},
      {q:"What is long-sightedness (hyperopia)?",options:["Can see near but not far","Can see far but not near — image focuses behind retina","Cannot see colour","Cannot see in dim light"],correct:1,explanation:"In long-sightedness, the lens is too flat or eyeball too short — image focuses BEHIND the retina."},
      {q:"How is long-sightedness corrected?",options:["Concave (diverging) lens","Convex (converging) lens","Flat glass","Sunglasses"],correct:1,explanation:"A convex (converging) lens bends light inwards, moving the focus forward onto the retina."},
      {q:"In short-sightedness, where does the image focus?",options:["On the retina","In front of the retina","Behind the retina","Outside the eye"],correct:1,explanation:"Short-sightedness: image focuses in front of the retina, so distant objects appear blurry."},
      {q:"In long-sightedness, where does the image focus?",options:["On the retina","In front of the retina","Behind the retina","Outside the eye"],correct:2,explanation:"Long-sightedness: image focuses behind the retina, so near objects appear blurry."},
      {q:"What is the blind spot?",options:["The centre of the retina","The area where the optic nerve leaves the eye — no rod or cone cells","The coloured part","The front of the lens"],correct:1,explanation:"The blind spot has no photoreceptors because that's where the optic nerve exits the eye."},
      {q:"What is the fovea?",options:["The blind spot","The area of the retina with the highest concentration of cone cells — gives sharpest vision","The front of the eye","The coloured part"],correct:1,explanation:"The fovea is packed with cone cells, giving the sharpest, most detailed vision."}
    ]
  }
};

// State per topic
const state = {};
Object.keys(topics).forEach(key => {
  state[key] = {
    active: [],
    completed: 0,
    firstTry: 0,
    attempts: 0,
    current: null,
    answered: false
  };
});

let currentTopic = "CNS";

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildTabs() {
  const tabsDiv = document.getElementById('tabs');
  tabsDiv.innerHTML = '';
  Object.keys(topics).forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === currentTopic ? ' active' : '');
    const remaining = state[key].active.length;
    const completed = state[key].completed;
    btn.innerHTML = `${topics[key].emoji} ${topics[key].name} <span class="badge">${completed}/${topics[key].questions.length}</span>`;
    btn.onclick = () => switchTopic(key);
    tabsDiv.appendChild(btn);
  });
}

function switchTopic(key) {
  currentTopic = key;
  const s = state[key];
  if (s.active.length === 0 && s.completed === 0) {
    // Initialise topic
    s.active = shuffle(topics[key].questions.map((q, i) => ({...q, id: i, seenBefore: false})));
  }
  buildTabs();
  if (s.completed === topics[key].questions.length) {
    showComplete();
  } else {
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('complete-area').style.display = 'none';
    showNextQuestion();
  }
}

function showNextQuestion() {
  const s = state[currentTopic];
  if (s.active.length === 0) {
    showComplete();
    return;
  }
  s.answered = false;
  s.current = s.active[0];
  document.getElementById('topic-tag').textContent = `${topics[currentTopic].emoji} ${topics[currentTopic].name}`;
  document.getElementById('question').textContent = s.current.q;
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('feedback').textContent = '';
  document.getElementById('next-btn').className = 'next-btn';

  const optionsDiv = document.getElementById('options');
  optionsDiv.innerHTML = '';
  s.current.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt;
    btn.onclick = () => selectAnswer(i, btn);
    optionsDiv.appendChild(btn);
  });

  updateStats();
}

function selectAnswer(index, btn) {
  const s = state[currentTopic];
  if (s.answered) return;
  s.answered = true;
  s.attempts++;

  const allBtns = document.querySelectorAll('.option');
  allBtns.forEach(b => b.disabled = true);
  const feedback = document.getElementById('feedback');

  if (index === s.current.correct) {
    btn.classList.add('correct');
    feedback.className = 'feedback correct show';
    feedback.innerHTML = `<strong>✓ Correct!</strong> ${s.current.explanation}`;
    s.completed++;
    if (!s.current.seenBefore) s.firstTry++;
    s.active.shift();
  } else {
    btn.classList.add('wrong');
    allBtns[s.current.correct].classList.add('correct');
    feedback.className = 'feedback wrong show';
    feedback.innerHTML = `<strong>✗ Not quite.</strong> Correct answer highlighted in green.<br><br><strong>Why:</strong> ${s.current.explanation}<br><br><em>This question will come back!</em>`;
    s.current.seenBefore = true;
    s.active.shift();
    s.active.push(s.current);
    // Shuffle remaining to mix in returned questions
    state[currentTopic].active = shuffle(s.active);
  }

  document.getElementById('next-btn').className = 'next-btn show';
  updateStats();
  buildTabs();
}

function updateStats() {
  const s = state[currentTopic];
  const total = topics[currentTopic].questions.length;
  const pct = (s.completed / total) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${s.completed} / ${total}`;
  document.getElementById('remaining').textContent = s.active.length;
  document.getElementById('first-try').textContent = s.firstTry;
  document.getElementById('attempts').textContent = s.attempts;
}

function showComplete() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('complete-area').style.display = 'block';
  const s = state[currentTopic];
  const total = topics[currentTopic].questions.length;
  const accuracy = Math.round((s.firstTry / total) * 100);
  let msg = '';
  if (accuracy === 100) msg = '🌟 Perfect! Every question right first try!';
  else if (accuracy >= 80) msg = '🎉 Excellent — you\'re well prepared!';
  else if (accuracy >= 60) msg = '👍 Good effort — review the ones you missed.';
  else msg = '📚 Keep revising — try again to improve!';

  document.getElementById('complete-stats').innerHTML = `
    <p><strong>Topic:</strong> ${topics[currentTopic].emoji} ${topics[currentTopic].name}</p>
    <p><strong>First-try accuracy:</strong> ${s.firstTry} / ${total} (${accuracy}%)</p>
    <p><strong>Total attempts:</strong> ${s.attempts}</p>
    <p style="margin-top:15px; font-size:16px;">${msg}</p>
  `;
}

function restartCurrentTopic() {
  const key = currentTopic;
  state[key] = {
    active: shuffle(topics[key].questions.map((q, i) => ({...q, id: i, seenBefore: false}))),
    completed: 0, firstTry: 0, attempts: 0, current: null, answered: false
  };
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('complete-area').style.display = 'none';
  buildTabs();
  showNextQuestion();
}

document.getElementById('next-btn').onclick = showNextQuestion;

// Initialise first topic
switchTopic("CNS");
</script>
</body>
